<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Smart Shopping Assistant</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h2>Smart Shopping Assistant</h2>

    <div class="card">
      <p><strong>Product:</strong> <span id="productName">Loading...</span></p>
      <p><strong>Brand:</strong> <span id="brandName">Loading...</span></p>
    </div>

    <button id="searchBtn">Search Product</button>

    <div id="resultsList"></div>

    <hr />
    <div style="font-size: 10px; color: #999; word-break: break-all;">
      <p><strong>Debug Image:</strong> <span id="debugHostname"></span></p>
    </div>
  </div>

  <script src="dist/popup.js"></script>
</body>
</html>
